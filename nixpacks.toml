# Override Nixpacks auto-detected uv install step.
# Without this, Nixpacks generates `pip install uv==` (empty version) and fails.

[phases.setup]
nixPkgs = ["python311"]

[phases.install]
cmds = [
  "pip install uv",
  "uv sync --no-dev --frozen"
]

[start]
cmd = "uvicorn src.api.app:app --host 0.0.0.0 --port $PORT"
